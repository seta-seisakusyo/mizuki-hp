services:
  next:
    image: ghcr.io/ryuji0128/mizuki-hp:${IMAGE_TAG:-latest}
    container_name: next_app
    ports:
      - "2999:3000"
    env_file:
      - ./next/.env
    environment:
      - DATABASE_URL=mysql://app_user:${MYSQL_PASSWORD:-app_pass}@mysql:3306/app_db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://mizuki-clinic.jp}
      - NEXTAUTH_TRUST_HOST=true
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./uploads:/app/public/uploads
    command: node server.js
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: 768m
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_pass}
    command: >
      --innodb-buffer-pool-size=96M --key-buffer-size=8M --max-connections=20 --table-open-cache=128 --tmp-table-size=8M --max-heap-table-size=8M --performance_schema=OFF
    mem_limit: 512m
    volumes:
      - ./mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./uploads:/var/www/uploads:ro
      - /var/log/nginx:/var/log/nginx
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      - next
    mem_limit: 96m
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    profiles: ["ssl"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email k_ryuji@setaseisakusyo.com --agree-tos --no-eff-email -d mizuki-clinic.jp -d www.mizuki-clinic.jp --keep-until-expiring
