# fail2ban filter for nginx rate limiting
# /etc/fail2ban/filter.d/nginx-limit-req.conf

[Definition]

# Nginx rate limit error message pattern
# Example: limiting requests, excess: 5.432 by zone "one", client: 192.168.1.1
failregex = ^\s*\[error\] \d+#\d+: \*\d+ limiting requests, excess: [\d.]+ by zone "[^"]+", client: <HOST>,.*$
            ^\s*limiting requests, excess: [\d.]+ by zone "[^"]+", client: <HOST>

ignoreregex =

